server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /en;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /en.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
