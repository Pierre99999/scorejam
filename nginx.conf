server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect old locale URLs to root
    location ~ ^/(en|fr)$ {
        return 301 /;
    }
    location ~ ^/(en|fr)/(.+)$ {
        return 301 /$2;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
